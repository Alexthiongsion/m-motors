services:
  db:
    image: postgres:16
    container_name: m-motors-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: m_motors
      POSTGRES_USER: m_motors_user
      POSTGRES_PASSWORD: m_motors_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build:
      context: ./backend
    container_name: m-motors-backend
    restart: unless-stopped
    environment:
      PORT: 5050
      DATABASE_URL: postgresql://m_motors_user:m_motors_password@db:5432/m_motors
      JWT_SECRET: change_me_for_production
      CLIENT_URL: http://localhost:5173
    ports:
      - "5050:5050"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5050
    container_name: m-motors-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
